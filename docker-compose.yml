version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scorekeeper
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: scorekeeper
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorekeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://scorekeeper:${DB_PASSWORD:-changeme}@db:5432/scorekeeper?sslmode=disable", "up"]

  backend:
    build:
      context: ./backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://scorekeeper:${DB_PASSWORD:-changeme}@db:5432/scorekeeper?sslmode=disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # OAuth callback comes through the frontend origin so Set-Cookie lands on
      # the same host the browser uses for everything else.
      GOOGLE_REDIRECT_URL: http://localhost:3000/api/v1/auth/google/callback
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      FRONTEND_URL: http://localhost:3000
      # Optional static login (username + password) available alongside
      # Google OAuth. Leave both unset to disable.
      STATIC_LOGIN_USERNAME: ${STATIC_LOGIN_USERNAME:-}
      STATIC_LOGIN_PASSWORD: ${STATIC_LOGIN_PASSWORD:-}
    # No `ports:` — the backend is only reachable inside the compose network
    # via the frontend's same-origin proxy. Uncomment to debug directly:
    # ports:
    #   - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      # Read by next.config.ts rewrites() at Next server startup (runtime, not
      # build time). One built image works across every environment.
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"

volumes:
  pgdata:
